body:
  text: 十二子曰長民者教之以德齊之以禮則民有恥心教之以政齊之以刑則民有免心故慈以愛之則民有親信以結之則民不倍恭以蒞之則民有遜心詩云吾夫夫恭且儉靡人不儉呂型云苗民非用霝制以刑惟作五瘧之刑曰法
