body:
  text: 十一子曰大臣之不親也則忠敬不足而富貴已過邦家之不寧也則大臣不治而褻臣托也此以大臣不可不敬也民之蕝也故君不以小謀大則大臣不令祭公之顧命云毋以小謀敗大作毋以嬖御衋莊后毋以嬖士衋大夫卿士
